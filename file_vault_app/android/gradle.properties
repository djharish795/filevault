org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Suppress the obsolete Java 8 source/target warnings from third-party plugins
# that haven't updated their build.gradle yet (e.g. receive_sharing_intent).
# The project-level build.gradle.kts subprojects block overrides them to Java 17.
kotlin.jvm.target.validation.mode=warning
