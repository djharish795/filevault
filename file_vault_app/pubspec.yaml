name: file_vault_app
description: FileVault - Mobile Document Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # API client
  dio: ^5.7.0

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # File picking for upload
  file_picker: ^8.1.7
  
  # Receive shared files from other apps
  receive_sharing_intent: ^1.8.0

  # Open files inline (PDF, images, docs)
  open_file: ^3.3.2
  url_launcher: ^6.3.1

  # Temp directory for resolving content:// URIs from share intents
  path_provider: ^2.1.4

  # Date formatting
  intl: ^0.19.0

  # Secure token storage (Keychain on iOS, Keystore on Android)
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21 # android >= 5.0


flutter:
  uses-material-design: true
  assets:
    - assets/images/
